<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="penGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <!-- Badge background -->
  <rect x="0" y="0" width="400" height="400" rx="56" fill="url(#bg)"/>
  <rect x="10" y="10" width="380" height="380" rx="48" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

  <!-- Notebook ("copy"), sits behind everything else -->
  <g transform="translate(200,250) rotate(-7)">
    <rect x="-100" y="-72" width="200" height="144" rx="12" fill="#fdf6ec" stroke="#e2d3b3" stroke-width="3"/>
    <rect x="-100" y="-72" width="26" height="144" rx="12" fill="#f3e6cc"/>
    <circle cx="-87" cy="-52" r="5" fill="#ffffff" stroke="#c9b891" stroke-width="3"/>
    <circle cx="-87" cy="-18" r="5" fill="#ffffff" stroke="#c9b891" stroke-width="3"/>
    <circle cx="-87" cy="16" r="5" fill="#ffffff" stroke="#c9b891" stroke-width="3"/>
    <circle cx="-87" cy="50" r="5" fill="#ffffff" stroke="#c9b891" stroke-width="3"/>
    <line x1="-58" y1="-35" x2="82" y2="-35" stroke="#cdb994" stroke-width="4" stroke-linecap="round"/>
    <line x1="-58" y1="-5" x2="82" y2="-5" stroke="#cdb994" stroke-width="4" stroke-linecap="round"/>
    <line x1="-58" y1="25" x2="82" y2="25" stroke="#cdb994" stroke-width="4" stroke-linecap="round"/>
    <line x1="-58" y1="55" x2="40" y2="55" stroke="#cdb994" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Pen, crossing diagonally over the notebook -->
  <g transform="translate(215,245) rotate(40)">
    <rect x="-15" y="-118" width="30" height="180" rx="9" fill="url(#penGrad)"/>
    <rect x="-15" y="-118" width="30" height="26" rx="7" fill="#fde68a"/>
    <rect x="-5" y="-126" width="10" height="16" rx="2" fill="#fbbf24"/>
    <polygon points="-15,62 15,62 0,100" fill="#78350f"/>
    <polygon points="-4,74 4,74 0,90" fill="#1c1917"/>
  </g>

  <!-- Hindi wordmark, drawn last so it sits on top -->
  <text x="200" y="108" text-anchor="middle"
        font-family="'Noto Sans Devanagari','Nirmala UI','Mangal',sans-serif"
        font-size="52" font-weight="800" fill="#ffffff">हिसाब किताब</text>
  <rect x="118" y="124" width="164" height="6" rx="3" fill="#f97316"/>
  <text x="200" y="156" text-anchor="middle" font-family="Poppins, Arial, sans-serif"
        font-size="15" letter-spacing="4" fill="#ccfbf1" font-weight="600">SHOP MANAGER</text>
</svg>
